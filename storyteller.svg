<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <!-- An elder in Newari dress reads the story to children gathered around her.
       Watercolor washes with pen-and-ink accents; sits directly on the page. -->
  <defs>
    <filter id="wash" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10"/>
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="pen" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045 0.06" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.8"/>
    </filter>
  </defs>

  <!-- ground wash, like a spread mat -->
  <ellipse cx="380" cy="318" rx="300" ry="42" fill="#c9b18c" opacity="0.28" filter="url(#wash)"/>
  <ellipse cx="380" cy="322" rx="215" ry="28" fill="#b06a3b" opacity="0.14" filter="url(#wash)"/>

  <!-- ===================== the elder, seated right, facing the children ===================== -->
  <g>
    <!-- body: black haku patasi with red border -->
    <g filter="url(#wash)">
      <path d="M470 310 q-6 -70 22 -102 q20 -22 44 -12 q20 9 24 40 q5 42 14 74 q-20 14 -56 14 q-34 0 -48 -14 Z" fill="#2a2320" opacity="0.85"/>
      <path d="M470 308 q50 18 104 0 l3 10 q-54 20 -110 0 Z" fill="#a03326" opacity="0.8"/>
      <!-- ghalek shawl across the torso -->
      <path d="M492 222 q26 -12 40 6 q10 34 16 58 q-26 8 -40 -4 q-12 -30 -16 -60 Z" fill="#ece5d6" opacity="0.8"/>
      <!-- arms reaching to the open folio -->
      <path d="M488 246 q-26 12 -40 34 q10 12 22 8 q16 -16 30 -26 Z" fill="#2a2320" opacity="0.8"/>
      <!-- head -->
      <circle cx="502" cy="196" r="21" fill="#c99b72" opacity="0.9"/>
      <!-- grey hair with bun -->
      <path d="M484 190 q0 -20 20 -20 q18 0 20 18 q1 8 -3 10 q2 -16 -17 -17 q-16 -1 -14 16 Z" fill="#9d948a" opacity="0.95"/>
      <circle cx="524" cy="184" r="7" fill="#9d948a" opacity="0.95"/>
      <!-- gold earring -->
      <circle cx="488" cy="202" r="2.6" fill="#c9982a" opacity="0.95"/>
    </g>
    <g filter="url(#pen)" stroke="#4a3826" fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M470 310 q-6 -70 22 -102 q20 -22 44 -12 q20 9 24 40 q5 42 14 74" stroke-width="1.6"/>
      <path d="M484 190 q0 -20 20 -20 q18 0 20 18" stroke-width="1.3"/>
      <path d="M492 206 q4 4 9 2" stroke-width="1.2"/>
      <path d="M448 280 q10 12 22 8" stroke-width="1.3"/>
    </g>

    <!-- the open folio, a long horizontal manuscript like the painting's own inscriptions -->
    <g filter="url(#wash)">
      <path d="M398 282 L462 270 L466 288 L402 300 Z" fill="#f2ead8" opacity="0.95"/>
    </g>
    <g filter="url(#pen)" stroke="#4a3826" fill="none" stroke-linecap="round">
      <path d="M398 282 L462 270 L466 288 L402 300 Z" stroke-width="1.4"/>
      <path d="M408 285 l44 -8 M410 291 l44 -8" stroke-width="1" opacity="0.65"/>
    </g>
  </g>

  <!-- ===================== children, circled in front of her ===================== -->
  <!-- each child: seated wash body, head, black topi or braid, thin ink line -->

  <!-- child 1: far left, crimson, back to viewer -->
  <g filter="url(#wash)">
    <path d="M160 300 q-2 -34 24 -40 q26 -6 30 26 q2 16 0 22 q-28 10 -54 -8 Z" fill="#a03326" opacity="0.75"/>
    <circle cx="186" cy="248" r="15" fill="#c99b72" opacity="0.9"/>
    <path d="M172 244 q2 -12 15 -12 q12 0 14 11 q-14 -6 -29 1 Z" fill="#2a2320" opacity="0.9"/>
  </g>
  <path d="M160 300 q-2 -34 24 -40 q26 -6 30 26" filter="url(#pen)" stroke="#4a3826" stroke-width="1.3" fill="none" opacity="0.8"/>

  <!-- child 2: mustard, leaning toward the elder -->
  <g filter="url(#wash)">
    <path d="M240 312 q0 -32 26 -36 q24 -4 28 24 q2 12 0 18 q-28 10 -54 -6 Z" fill="#c9982a" opacity="0.6"/>
    <circle cx="268" cy="262" r="14" fill="#c99b72" opacity="0.9"/>
    <path d="M255 258 q2 -11 14 -11 q11 0 13 10 q-13 -5 -27 1 Z" fill="#2a2320" opacity="0.9"/>
  </g>
  <path d="M240 312 q0 -32 26 -36 q24 -4 28 24" filter="url(#pen)" stroke="#4a3826" stroke-width="1.3" fill="none" opacity="0.8"/>

  <!-- child 3: teal, small, closest to folio -->
  <g filter="url(#wash)">
    <path d="M318 318 q-2 -28 22 -32 q22 -4 26 20 q2 11 0 16 q-24 10 -48 -4 Z" fill="#31564a" opacity="0.6"/>
    <circle cx="342" cy="274" r="13" fill="#c99b72" opacity="0.9"/>
    <path d="M348 262 q10 2 8 12 q-4 8 -10 6" fill="#2a2320" opacity="0.85"/>
  </g>
  <path d="M318 318 q-2 -28 22 -32 q22 -4 26 20" filter="url(#pen)" stroke="#4a3826" stroke-width="1.3" fill="none" opacity="0.8"/>

  <!-- child 4: plum, beside the elder, seen from behind -->
  <g filter="url(#wash)">
    <path d="M580 314 q2 -30 -22 -34 q-22 -4 -26 20 q-2 12 0 17 q24 10 48 -3 Z" fill="#6b2f42" opacity="0.65"/>
    <circle cx="556" cy="270" r="13" fill="#c99b72" opacity="0.9"/>
    <path d="M544 266 q2 -10 13 -10 q10 0 12 9 q-12 -5 -25 1 Z" fill="#2a2320" opacity="0.9"/>
  </g>
  <path d="M580 314 q2 -30 -22 -34 q-22 -4 -26 20" filter="url(#pen)" stroke="#4a3826" stroke-width="1.3" fill="none" opacity="0.8"/>

  <!-- child 5: ochre, front center, back to viewer with braid -->
  <g filter="url(#wash)">
    <path d="M404 338 q-2 -30 24 -34 q24 -4 28 22 q2 12 0 16 q-26 10 -52 -4 Z" fill="#b06a3b" opacity="0.6"/>
    <circle cx="430" cy="292" r="14" fill="#c99b72" opacity="0.9"/>
    <path d="M418 288 q2 -11 14 -11 q11 0 13 10 q-13 -5 -27 1 Z" fill="#2a2320" opacity="0.9"/>
    <path d="M430 302 q-2 14 2 24" stroke="#2a2320" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round"/>
  </g>
  <path d="M404 338 q-2 -30 24 -34 q24 -4 28 22" filter="url(#pen)" stroke="#4a3826" stroke-width="1.3" fill="none" opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 250" width="340" height="250">
  <!-- Rato Machhindranath chariot, pen-and-ink with watercolor. Faces right; wheels turn. -->
  <defs>
    <filter id="bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="ink" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.06" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.6"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="165" cy="228" rx="120" ry="9" fill="#8a7a62" opacity="0.18" filter="url(#bleed)"/>

  <!-- ===== spire of greenery, leaning gently forward (right) ===== -->
  <g filter="url(#bleed)">
    <path d="M138 142 L166 142 L178 96 L186 52 L189 20 L183 20 L170 55 L152 100 Z" fill="#7d8f5c" opacity="0.7"/>
    <path d="M144 142 L162 142 L174 90 L183 40 L186 22 L178 40 L162 92 Z" fill="#5f7546" opacity="0.55"/>
    <path d="M150 138 L160 138 L172 84 L181 36 L176 50 L160 96 Z" fill="#4c6238" opacity="0.4"/>
  </g>
  <g filter="url(#ink)" stroke="#4a3826" fill="none" stroke-linecap="round">
    <path d="M139 142 C150 108 162 68 188 21" stroke-width="2"/>
    <path d="M166 142 C174 112 182 70 190 20" stroke-width="2"/>
    <path d="M148 118 L172 116 M154 96 L177 92 M160 74 L182 68 M168 48 L186 42" stroke-width="1.2" opacity="0.7"/>
  </g>
  <!-- ribbons streaming from the top -->
  <g filter="url(#ink)" fill="none" stroke-linecap="round">
    <path d="M188 24 C170 40 150 48 128 66" stroke="#a03326" stroke-width="2.4" opacity="0.75"/>
    <path d="M188 28 C176 48 160 62 144 84" stroke="#c05a3a" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- red crown + gold finial -->
  <g filter="url(#bleed)">
    <path d="M178 22 L198 22 L194 8 L182 8 Z" fill="#a03326" opacity="0.85"/>
    <circle cx="188" cy="6" r="3.4" fill="#c9982a" opacity="0.95"/>
  </g>
  <path d="M178 22 L198 22 M182 8 L194 8" stroke="#4a3826" stroke-width="1.4" filter="url(#ink)"/>

  <!-- ===== base pavilion ===== -->
  <g filter="url(#bleed)">
    <rect x="86" y="150" width="150" height="34" rx="3" fill="#a03326" opacity="0.8"/>
    <rect x="80" y="142" width="162" height="10" rx="2" fill="#c9982a" opacity="0.85"/>
    <rect x="92" y="184" width="138" height="12" fill="#7c5a34" opacity="0.75"/>
  </g>
  <g filter="url(#ink)" stroke="#4a3826" fill="none">
    <rect x="86" y="150" width="150" height="34" rx="3" stroke-width="2"/>
    <path d="M80 142 h162 M92 184 h138 M106 150 v34 M136 150 v34 M166 150 v34 M196 150 v34" stroke-width="1.3" opacity="0.8"/>
  </g>

  <!-- ===== pull beam with Bhairav head, facing right ===== -->
  <g filter="url(#bleed)">
    <path d="M232 190 L316 200 L316 208 L232 200 Z" fill="#7c5a34" opacity="0.8"/>
    <!-- Bhairav head -->
    <path d="M300 176 q16 2 18 16 q2 14 -12 16 q-16 2 -20 -12 q-3 -16 14 -20 Z" fill="#b08a3e" opacity="0.9"/>
    <path d="M300 176 q4 -8 10 -4 q6 3 4 8 Z" fill="#a03326" opacity="0.85"/>
  </g>
  <g filter="url(#ink)" stroke="#4a3826" fill="none" stroke-linecap="round">
    <path d="M232 190 L316 200 M232 200 L316 208" stroke-width="1.6"/>
    <path d="M300 176 q16 2 18 16 q2 14 -12 16 q-16 2 -20 -12 q-3 -16 14 -20" stroke-width="1.8"/>
    <circle cx="309" cy="192" r="1.6" fill="#4a3826" stroke="none"/>
    <path d="M304 200 q5 3 9 1" stroke-width="1.3"/>
  </g>

  <!-- ===== wheels (turning) ===== -->
  <g>
    <g transform="translate(120,200)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
        <g filter="url(#bleed)">
          <circle r="30" fill="#b06a3b" opacity="0.55"/>
          <circle r="10" fill="#a03326" opacity="0.8"/>
        </g>
        <g filter="url(#ink)" stroke="#4a3826" fill="none" stroke-linecap="round">
          <circle r="30" stroke-width="3.4"/>
          <circle r="23" stroke-width="1.2" opacity="0.6"/>
          <path d="M0 -27 V27 M-27 0 H27 M-19 -19 L19 19 M-19 19 L19 -19" stroke-width="2"/>
          <circle r="4.5" stroke-width="2"/>
        </g>
      </g>
    </g>
    <g transform="translate(205,200)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
        <g filter="url(#bleed)">
          <circle r="30" fill="#b06a3b" opacity="0.55"/>
          <circle r="10" fill="#a03326" opacity="0.8"/>
        </g>
        <g filter="url(#ink)" stroke="#4a3826" fill="none" stroke-linecap="round">
          <circle r="30" stroke-width="3.4"/>
          <circle r="23" stroke-width="1.2" opacity="0.6"/>
          <path d="M0 -27 V27 M-27 0 H27 M-19 -19 L19 19 M-19 19 L19 -19" stroke-width="2"/>
          <circle r="4.5" stroke-width="2"/>
        </g>
      </g>
    </g>
  </g>
</svg>
